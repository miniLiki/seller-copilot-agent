services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: seller_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwer5358
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d seller_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      SELLER_COPILOT_STORAGE: postgres
      DATABASE_URL: postgresql://postgres:qwer5358@db:5432/seller_copilot
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    command: sh -c "alembic upgrade head && python -m tools.seed_postgres --count 100 && uvicorn tools.app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
    depends_on:
      - api

volumes:
  postgres_data:
